<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tab Opener</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  safelist: ['bg-emerald-400', 'bg-amber-400', 'bg-red-500']
}
</script>
<link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gray-50 text-gray-900 text-sm antialiased select-none">

<div class="sticky top-0 z-10 bg-white/95 backdrop-blur-sm border-b border-gray-200 shadow-sm px-4 py-3 flex flex-col gap-2">
  <div class="flex items-center gap-1.5 font-semibold">
    Terminal Tabs
    <span id="tabCount" class="bg-gray-100 text-gray-500 rounded-full px-2 py-0.5 text-xs font-medium">0</span>
  </div>
  <input id="filter" type="text" placeholder="🔍 filter…" autocomplete="off"
    class="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-xs outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 bg-white transition-all">
  <input id="spawnCwd" type="text" placeholder="~/dir"
    class="w-full border border-gray-200 rounded-lg px-3 py-1.5 text-xs font-mono outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 bg-white transition-all">
  <div class="flex gap-1.5 items-center">
    <select id="modelSelect"
      class="flex-1 border border-gray-200 rounded-lg px-2 py-1.5 text-xs bg-white outline-none cursor-pointer focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
      <optgroup label="Claude">
        <option value="claude-opus-4-7">Opus 4.7</option>
        <option value="claude-sonnet-4-6">Sonnet 4.6</option>
        <option value="claude-sonnet-4-5">Sonnet 4.5</option>
      </optgroup>
      <optgroup label="Antigravity (agy)">
        <option value="auto">Auto (agy)</option>
        <option value="gemini-3.5-flash">Gemini 3.5 Flash (New!)</option>
        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro (preview)</option>
        <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite (preview)</option>
      </optgroup>
      <optgroup label="DeepSeek">
        <option value="deepseek-v4-flash">DeepSeek Flash</option>
        <option value="deepseek-v4-pro">DeepSeek Pro</option>
      </optgroup>
    </select>
    <button onclick="spawnModel()" class="bg-blue-400 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded-full whitespace-nowrap transition-colors cursor-pointer text-xs">
      + Spawn
    </button>
    <button onclick="spawnTerminal()" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded-full whitespace-nowrap transition-colors cursor-pointer text-xs">
      + Terminal
    </button>
  </div>
</div>

<div id="tabList" class="px-4 py-2 flex flex-col gap-1.5"></div>
<script src="/app.js"></script>
</body>
</html>
